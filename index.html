<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>check_peers · Gno.land Test13</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #12151c;
    --surface: #181c25;
    --surface-2: #1f2430;
    --border: #2a2f3c;
    --border-soft: #232833;
    --text: #e9ebef;
    --text-dim: #8991a0;
    --text-faint: #5a6272;
    --good: #4fd1c5;
    --good-dim: #234845;
    --warn: #e8a33d;
    --warn-dim: #4a3a1c;
    --bad: #e2617a;
    --bad-dim: #4a2530;
    --brand: #6c8cff;
    --radius: 10px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(108,140,255,0.06), transparent 40%),
      radial-gradient(circle at 85% 10%, rgba(79,209,197,0.05), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:0 20px 60px;
  }

  .wrap{max-width:960px;margin:0 auto;}

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:28px 0 20px;flex-wrap:wrap;gap:14px;
    border-bottom:1px solid var(--border-soft);
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(155deg,#20242f,#171a22);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand-mark svg{width:18px;height:18px;}
  .brand-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16.5px;letter-spacing:0.01em;}
  .brand-sub{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-faint);margin-top:1px;}

  .live{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 0 rgba(79,209,197,0.6);
    animation:pulse 2.2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(79,209,197,0.45);}
    70%{box-shadow:0 0 0 6px rgba(79,209,197,0);}
    100%{box-shadow:0 0 0 0 rgba(79,209,197,0);}
  }
  @media (prefers-reduced-motion: reduce){ .live-dot{animation:none;} }

  .tabs{display:flex;gap:4px;padding:20px 0 0;border-bottom:1px solid var(--border-soft);}
  .tab-btn{
    font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;color:var(--text-faint);
    background:none;border:none;padding:10px 4px 12px;margin-right:20px;cursor:pointer;
    border-bottom:2px solid transparent;transition:color .15s ease, border-color .15s ease;
  }
  .tab-btn:hover{color:var(--text-dim);}
  .tab-btn.active{color:var(--text);border-bottom-color:var(--brand);}

  .hero{display:flex;gap:14px;flex-wrap:wrap;padding:28px 0 8px;}
  .stat-main{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:22px 26px;flex:1 1 260px;min-width:220px;
  }
  .stat-main .num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:44px;line-height:1;
    display:flex;align-items:baseline;gap:8px;}
  .stat-main .num small{font-size:20px;font-weight:600;color:var(--text-dim);}
  .stat-main .label{font-size:13px;color:var(--text-dim);margin-top:8px;}

  .stat-side{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 20px;flex:1 1 150px;min-width:140px;display:flex;flex-direction:column;justify-content:center;gap:4px;
  }
  .stat-side .val{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:22px;}
  .stat-side .lbl{font-size:12px;color:var(--text-dim);}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:24px 0 14px;}
  .search{
    flex:1 1 220px;background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:9px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;
  }
  .search::placeholder{color:var(--text-faint);}
  .search:focus{outline:2px solid var(--brand);outline-offset:1px;}
  .toggle{
    display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim);
    background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;cursor:pointer;
    user-select:none;
  }
  .toggle input{accent-color:var(--brand);}
  .source-list{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-faint);padding:0 0 10px;}
  .source-list b{color:var(--text-dim);font-weight:500;}

  .table-wrap{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    overflow-x:auto;
  }
  table{width:100%;border-collapse:collapse;min-width:640px;}
  thead th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);
    font-weight:600;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;
    position:sticky;top:0;background:var(--surface);
  }
  thead th:hover{color:var(--text-dim);}
  thead th.sorted{color:var(--brand);}
  tbody tr{border-bottom:1px solid var(--border-soft);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--surface-2);}
  td{padding:11px 14px;font-size:13px;vertical-align:middle;white-space:nowrap;}
  td.moniker{font-weight:500;}
  td.mono{font-family:'JetBrains Mono',monospace;color:var(--text-dim);font-size:12px;}

  .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .status-dot.good{background:var(--good);}
  .status-dot.warn{background:var(--warn);}
  .status-dot.bad{background:var(--bad);}

  .pulse{display:flex;gap:2px;align-items:flex-end;height:16px;}
  .pulse i{width:4px;border-radius:1px;background:var(--border);display:inline-block;}
  .pulse i.up{background:var(--good);height:16px;}
  .pulse i.down{background:var(--bad-dim);height:6px;}

  .uptime-pct{font-family:'JetBrains Mono',monospace;font-weight:600;}
  .uptime-pct.good{color:var(--good);}
  .uptime-pct.warn{color:var(--warn);}
  .uptime-pct.bad{color:var(--bad);}

  .pill{
    font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 7px;border-radius:20px;
    background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);
  }

  .empty, .error{padding:50px 20px;text-align:center;color:var(--text-dim);font-size:14px;}
  .error a{color:var(--brand);}

  footer{
    padding:26px 4px 0;font-size:12px;color:var(--text-faint);
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
  }
  footer a{color:var(--text-dim);text-decoration:none;border-bottom:1px solid var(--border);}
  footer a:hover{color:var(--brand);border-color:var(--brand);}

  @media (max-width:640px){
    .stat-main .num{font-size:34px;}
    td.ip-col{display:none;}
    thead th.ip-col{display:none;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 6H19L7 18H19" stroke="#ECEFF4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">check_peers</div>
        <div class="brand-sub">Gno.land Test13 · ZeycaNode</div>
      </div>
    </div>
    <div class="live">
      <span class="live-dot" aria-hidden="true"></span>
      <span id="updated-at">yükleniyor…</span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="peers">Peer Network</button>
    <button class="tab-btn" data-tab="validators">Validator Uptime</button>
  </div>

  <div id="content-peers" class="tab-panel">
    <div class="empty">Peer verisi yükleniyor…</div>
  </div>

  <div id="content-validators" class="tab-panel" style="display:none;">
    <div class="empty">Validator verisi yükleniyor…</div>
  </div>

  <footer>
    <span>30 dakikada bir otomatik güncellenir · birden fazla bağımsız RPC kaynağından toplanır</span>
    <a href="https://github.com/zeycan1/gnoland-check-peers" target="_blank" rel="noopener">GitHub'da görüntüle →</a>
  </footer>

</div>

<script>
const PEERS_URL = "https://raw.githubusercontent.com/zeycan1/gnoland-check-peers/main/peers.json";
const HISTORY_URL = "https://raw.githubusercontent.com/zeycan1/gnoland-check-peers/main/history.json";

let peersData = [];
let totalSources = 0;
let sortKey = "uptime_pct";
let sortDir = -1;
let onlyUnreliable = false;
let searchTerm = "";

function timeAgo(iso){
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.round(diffMs/60000);
  if(mins < 1) return "az önce";
  if(mins < 60) return `${mins} dk önce`;
  return `${Math.round(mins/60)} sa önce`;
}

function statusClass(p){
  if(p.uptime_pct >= 0.9) return "good";
  if(p.uptime_pct >= 0.7) return "warn";
  return "bad";
}

function renderPulse(hist){
  if(!hist || !hist.length) return '<span class="pulse"></span>';
  const bars = hist.slice(-10).map(v => `<i class="${v ? 'up' : 'down'}"></i>`).join("");
  return `<span class="pulse">${bars}</span>`;
}

const COLS = [
  {key:null, label:""},
  {key:"moniker", label:"Moniker"},
  {key:"ip", label:"IP:Port", cls:"ip-col"},
  {key:null, label:"Nabız (son 10)"},
  {key:"uptime_pct", label:"Uptime"},
  {key:"source_diversity", label:"Kaynak"},
  {key:"is_outbound", label:"Yön"},
];

function buildTable(target){
  let rows = peersData.filter(p=>{
    if(onlyUnreliable && p.reliable) return false;
    if(searchTerm){
      const s = searchTerm.toLowerCase();
      return (p.moniker||"").toLowerCase().includes(s) || p.node_id.toLowerCase().includes(s) || p.ip.includes(s);
    }
    return true;
  });

  rows.sort((a,b)=>{
    let av = a[sortKey], bv = b[sortKey];
    if(typeof av === "string"){ av = av.toLowerCase(); bv = (bv||"").toLowerCase(); }
    if(av < bv) return -1*sortDir;
    if(av > bv) return 1*sortDir;
    return 0;
  });

  if(!rows.length){
    target.innerHTML = `<div class="empty">Eşleşen peer yok. Filtreyi temizlemeyi dene.</div>`;
    return;
  }

  const thead = COLS.map(c=>{
    if(!c.key) return `<th class="${c.cls||''}">${c.label}</th>`;
    const sorted = sortKey === c.key ? "sorted" : "";
    const arrow = sortKey === c.key ? (sortDir===1 ? " ↑" : " ↓") : "";
    return `<th class="${sorted} ${c.cls||''}" data-key="${c.key}">${c.label}${arrow}</th>`;
  }).join("");

  const tbody = rows.map(p=>{
    const sc = statusClass(p);
    const pct = Math.round(p.uptime_pct*100);
    return `<tr>
      <td><span class="status-dot ${sc}" title="${p.reliable ? 'güvenilir' : 'eşiğin altında'}"></span></td>
      <td class="moniker" title="${p.node_id}">${p.moniker || '(isimsiz)'}</td>
      <td class="mono ip-col">${p.ip}:${p.port}</td>
      <td>${renderPulse(p.history)}</td>
      <td class="uptime-pct ${sc}">%${pct}</td>
      <td><span class="pill">${p.source_diversity}/${totalSources}</span></td>
      <td class="mono">${p.is_outbound ? 'outbound' : 'inbound'}</td>
    </tr>`;
  }).join("");

  target.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
  `;

  target.querySelectorAll("th[data-key]").forEach(th=>{
    th.addEventListener("click", ()=>{
      const key = th.dataset.key;
      if(sortKey === key){ sortDir *= -1; } else { sortKey = key; sortDir = -1; }
      buildTable(target);
    });
  });
}

async function load(){
  try{
    const [peersRes, histRes] = await Promise.all([
      fetch(PEERS_URL, {cache:"no-store"}),
      fetch(HISTORY_URL, {cache:"no-store"}),
    ]);
    if(!peersRes.ok) throw new Error("peers.json alınamadı");
    const peersJson = await peersRes.json();
    const historyJson = histRes.ok ? await histRes.json() : {};

    totalSources = (peersJson.rpc_sources || []).length;

    peersData = Object.entries(peersJson.peers || {}).map(([node_id, p])=>({
      node_id, ...p, history: historyJson[node_id] || []
    }));

    document.getElementById("updated-at").textContent =
      `güncellendi: ${timeAgo(peersJson.generated_at)}`;

    document.getElementById("content-peers").innerHTML = `
      <div class="hero">
        <div class="stat-main">
          <div class="num">${peersJson.reliable_peers}<small>/ ${peersJson.total_peers}</small></div>
          <div class="label">peer, %70 uptime eşiğini geçiyor</div>
        </div>
        <div class="stat-side">
          <div class="val">${totalSources}</div>
          <div class="lbl">bağımsız RPC kaynağı</div>
        </div>
        <div class="stat-side">
          <div class="val">${Math.round((peersJson.reliable_peers/peersJson.total_peers)*100)}%</div>
          <div class="lbl">ağ sağlığı</div>
        </div>
      </div>
      <div class="source-list"><b>Kaynaklar:</b> ${(peersJson.rpc_sources||[]).join(" · ")}</div>
      <div class="controls">
        <input class="search" id="search" type="text" placeholder="moniker, node id veya ip ara…">
        <label class="toggle"><input type="checkbox" id="only-unreliable"> sadece güvenilmez olanlar</label>
      </div>
      <div id="table-holder"></div>
    `;

    const tableHolder = document.getElementById("table-holder");

    document.getElementById("search").addEventListener("input", e=>{
      searchTerm = e.target.value; buildTable(tableHolder);
    });
    document.getElementById("only-unreliable").addEventListener("change", e=>{
      onlyUnreliable = e.target.checked; buildTable(tableHolder);
    });

    buildTable(tableHolder);

  }catch(err){
    document.getElementById("content-peers").innerHTML = `
      <div class="error">
        Peer verisi yüklenemedi (${err.message}).<br>
        <a href="${PEERS_URL}" target="_blank" rel="noopener">Ham JSON'u doğrudan görüntüle</a>
      </div>`;
  }
}

// ---------------------------------------------------------------------------
// Sekme gecisi
// ---------------------------------------------------------------------------
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    document.getElementById("content-peers").style.display = tab === "peers" ? "" : "none";
    document.getElementById("content-validators").style.display = tab === "validators" ? "" : "none";
    if(tab === "validators" && !validatorsLoaded){ loadValidators(); }
  });
});

// ---------------------------------------------------------------------------
// Validator Uptime sekmesi
// ---------------------------------------------------------------------------
const VALIDATORS_URL = "https://raw.githubusercontent.com/zeycan1/gnoland-check-peers/main/validators.json";

let validatorsData = [];
let validatorsLoaded = false;
let vSortKey = "uptime_pct";
let vSortDir = 1;
let vOnlyLow = false;

function vStatusClass(uptimePct){
  if(uptimePct >= 0.95) return "good";
  if(uptimePct >= 0.8) return "warn";
  return "bad";
}

function shortAddr(addr){
  return addr.slice(0,10) + "…" + addr.slice(-6);
}

const V_COLS = [
  {key:null, label:""},
  {key:"address", label:"Validator Adresi"},
  {key:"voting_power", label:"Voting Power"},
  {key:"signed", label:"İmzaladı"},
  {key:"missed", label:"Kaçırdı"},
  {key:"uptime_pct", label:"Uptime"},
  {key:"current_missed_streak", label:"Şu An Seri"},
  {key:"max_missed_streak", label:"En Uzun Seri"},
];

function buildValidatorTable(target){
  let rows = validatorsData.filter(v=>{
    if(vOnlyLow && v.uptime_pct >= 0.95) return false;
    return true;
  });

  rows.sort((a,b)=>{
    let av = a[vSortKey], bv = b[vSortKey];
    if(typeof av === "string"){ av = av.toLowerCase(); bv = (bv||"").toLowerCase(); }
    if(av < bv) return -1*vSortDir;
    if(av > bv) return 1*vSortDir;
    return 0;
  });

  if(!rows.length){
    target.innerHTML = `<div class="empty">Eşleşen validator yok.</div>`;
    return;
  }

  const thead = V_COLS.map(c=>{
    if(!c.key) return `<th></th>`;
    const sorted = vSortKey === c.key ? "sorted" : "";
    const arrow = vSortKey === c.key ? (vSortDir===1 ? " ↑" : " ↓") : "";
    return `<th class="${sorted}" data-vkey="${c.key}">${c.label}${arrow}</th>`;
  }).join("");

  const tbody = rows.map(v=>{
    const sc = vStatusClass(v.uptime_pct);
    const pct = Math.round(v.uptime_pct*100);
    return `<tr>
      <td><span class="status-dot ${sc}"></span></td>
      <td class="mono" title="${v.address}">${shortAddr(v.address)}</td>
      <td class="mono">${v.voting_power}</td>
      <td class="mono">${v.signed}</td>
      <td class="mono">${v.missed}</td>
      <td class="uptime-pct ${sc}">%${pct}</td>
      <td class="mono">${v.current_missed_streak}</td>
      <td class="mono">${v.max_missed_streak}</td>
    </tr>`;
  }).join("");

  target.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
  `;

  target.querySelectorAll("th[data-vkey]").forEach(th=>{
    th.addEventListener("click", ()=>{
      const key = th.dataset.vkey;
      if(vSortKey === key){ vSortDir *= -1; } else { vSortKey = key; vSortDir = key === "uptime_pct" ? 1 : -1; }
      buildValidatorTable(target);
    });
  });
}

async function loadValidators(){
  const container = document.getElementById("content-validators");
  try{
    const res = await fetch(VALIDATORS_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("validators.json alınamadı");
    const json = await res.json();

    validatorsData = Object.entries(json.results || {}).map(([address, r])=>({address, ...r}));
    validatorsLoaded = true;

    const avgUptime = validatorsData.length
      ? validatorsData.reduce((s,v)=>s+v.uptime_pct,0) / validatorsData.length
      : 0;
    const lowCount = validatorsData.filter(v=>v.uptime_pct < 0.95).length;

    container.innerHTML = `
      <div class="hero">
        <div class="stat-main">
          <div class="num">${Math.round(avgUptime*100)}<small>%</small></div>
          <div class="label">ortalama validator uptime'ı (son ${json.total_validators} validator)</div>
        </div>
        <div class="stat-side">
          <div class="val">${lowCount}</div>
          <div class="lbl">%95 altı uptime'lı validator</div>
        </div>
        <div class="stat-side">
          <div class="val">${json.last_scanned_height}</div>
          <div class="lbl">son taranan blok</div>
        </div>
      </div>
      <div class="source-list"><b>Not:</b> validator adresi P2P node ID'den farklıdır, moniker eşleştirmesi henüz yok.</div>
      <div class="controls">
        <label class="toggle"><input type="checkbox" id="only-low-uptime"> sadece %95 altı</label>
      </div>
      <div id="validator-table-holder"></div>
    `;

    const holder = document.getElementById("validator-table-holder");
    document.getElementById("only-low-uptime").addEventListener("change", e=>{
      vOnlyLow = e.target.checked; buildValidatorTable(holder);
    });
    buildValidatorTable(holder);

  }catch(err){
    container.innerHTML = `
      <div class="error">
        Validator verisi yüklenemedi (${err.message}).<br>
        <a href="${VALIDATORS_URL}" target="_blank" rel="noopener">Ham JSON'u doğrudan görüntüle</a>
      </div>`;
  }
}

load();
</script>
</body>
</html>
